{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Вход в систему</h2>
<form method="POST" class="mt-3">
    <div class="mb-3">
        <label class="form-label fw-bold">Логин</label>
        <input type="text" name="login" class="form-control border-dark bg-white text-dark" required>
    </div>
    <div class="mb-3">
        <label class="form-label fw-bold">Пароль</label>
        <input type="password" name="password" class="form-control border-dark bg-white text-dark" required>
    </div>
    <button type="submit" class="btn btn-dark fw-bold">Войти</button>
</form>
{% endblock %}
