{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Изменение пароля</h2>
<form method="POST" class="mt-3">
    <div class="mb-3">
        <label class="form-label fw-bold">Старый пароль</label>
        <input type="password" name="old_password" class="form-control border-dark bg-white text-dark {% if errors.old_password %}is-invalid{% endif %}">
        {% if errors.old_password %}<div class="invalid-feedback">{{ errors.old_password }}</div>{% endif %}
    </div>
    <div class="mb-3">
        <label class="form-label fw-bold">Новый пароль</label>
        <input type="password" name="new_password" class="form-control border-dark bg-white text-dark {% if errors.new_password %}is-invalid{% endif %}">
        {% if errors.new_password %}<div class="invalid-feedback">{{ errors.new_password }}</div>{% endif %}
    </div>
    <div class="mb-3">
        <label class="form-label fw-bold">Повторите новый пароль</label>
        <input type="password" name="confirm_password" class="form-control border-dark bg-white text-dark {% if errors.confirm_password %}is-invalid{% endif %}">
        {% if errors.confirm_password %}<div class="invalid-feedback">{{ errors.confirm_password }}</div>{% endif %}
    </div>
    <button type="submit" class="btn btn-dark fw-bold">Сохранить</button>
</form>
{% endblock %}
