<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <div class="sticky-top bg-white shadow-sm" style="z-index: 1030;">
        <header class="header py-3 border-bottom">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center header-main-row">
                    <a href="index.html" class="logo text-decoration-none text-dark fw-bold fs-3">ВашМир</a>

                    <div class="search-container flex-grow-1 mx-4 d-none d-md-block position-relative">
                        <div class="input-group">
                            <input type="text" class="form-control" id="search-input" placeholder="Введите зарос" autocomplete="off">
                            <button class="btn btn-dark" type="button" id="search-btn"><i class="bi bi-search"></i></button>
                        </div>
                        <div id="autocomplete-list" class="autocomplete-suggestions"></div>
                    </div>

                    <div class="header-icons d-flex align-items-center gap-3">
                        <a href="cart.html" class="icon-link text-dark position-relative">
                            <i class="bi bi-cart3 fs-4"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark" id="cart-badge">0</span>
                        </a>
                        <a href="profile.html" class="icon-link text-dark"><i class="bi bi-person-circle fs-4"></i></a>
                    </div>
                </div>

                <div class="search-container mt-3 d-md-none position-relative">
                    <div class="input-group">
                        <input type="text" class="form-control" id="search-input-mobile" placeholder="Введите запрос">
                        <button class="btn btn-dark" type="button"><i class="bi bi-search"></i></button>
                    </div>
                    <div id="autocomplete-list-mobile" class="autocomplete-suggestions"></div>
                </div>
            </div>
        </header>

        <div id="global-notification" style="display: none;">
            <div class="container-fluid py-2">
                <div class="alert alert-success alert-dismissible fade show text-center mb-0" role="alert" id="notification-alert">
                    <span id="notification-text"></span>
                    <button type="button" class="btn-close" 
                    onclick="this.parentElement.parentElement.parentElement.style.display='none'"></button>
                </div>
            </div>
        </div>
    </div>

    <main class="container my-4 flex-grow-1">
        <div class="row">
            <div class="col-lg-3 col-md-4 mb-4">
                <div class="sidebar p-3 border rounded bg-light">
                    <h3 class="h5 mb-3">Фильтры</h3>
                    <form id="filter-form">
                        <div class="mb-4">
                            <h5 class="h6 fw-bold">Категория</h5>
                            <div id="category-filters">
                            </div>
                        </div>
                        <div class="mb-4">
                            <h5 class="h6 fw-bold">Стоимость</h5>
                            <div class="d-flex gap-2">
                                <input type="number" class="form-control" id="min-price" placeholder="От">
                                <input type="number" class="form-control" id="max-price" placeholder="До">
                            </div>
                        </div>
                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="only-discount">
                                <label class="form-check-label" for="only-discount">Товары со скидкой</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold">Применить</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-9 col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                    <h1 class="h3 m-0">Каталог</h1>
                    <select class="form-select w-auto" id="sort-select">
                        <option value="rating_desc">По убыванию рейтинга</option>
                        <option value="rating_asc">По возрастанию рейтинга</option>
                        <option value="price_asc">По возрастанию цены</option>
                        <option value="price_desc">По убыванию цены</option>
                    </select>
                </div>

                <div id="loader" class="text-center py-5">
                    <div class="spinner-border text-warning" role="status"></div>
                </div>

                <div class="row g-4" id="goods-container"></div>

                <div class="text-center mt-4">
                    <button class="btn btn-secondary px-5" id="load-more-btn" style="display: none;">Загрузить ещё</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-2">+7 (999) 123-45-67 &nbsp;&nbsp; vashmir@vm.ru &nbsp;&nbsp; г. Киров, ул. Ленина, 12</p>
            <p class="small text-white-50 mb-0">&copy; 2025 ВашМир</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
