<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <div class="sticky-header-container">
        <header class="header py-3 border-bottom">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center">
                    <a href="index.html" class="logo text-decoration-none text-dark fw-bold fs-3">ВашМир</a>
                    <div class="d-flex align-items-center gap-3">
                        <a href="index.html" class="icon-link text-dark" title="Каталог">
                            <i class="bi bi-list-ul fs-4"></i>
                        </a>
                        <a href="profile.html" class="icon-link text-dark" title="Личный кабинет">
                            <i class="bi bi-person-circle fs-4"></i>
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <div id="global-notification" style="display: none;">
            <div class="alert alert-success alert-dismissible fade show text-center mb-0 rounded-0" role="alert" id="notification-alert">
                <span id="notification-text"></span>
                <button type="button" class="btn-close" 
                onclick="this.parentElement.parentElement.style.display='none'"></button>
            </div>
        </div>
    </div>

    <main class="container my-4 flex-grow-1">
        <section class="mb-5">
            <h1 class="h3 mb-4 fw-bold">Корзина</h1>

            <div id="cart-loader" class="text-center py-5">
                <div class="spinner-border text-warning" role="status">
                    <span class="visually-hidden">Загрузка...</span>
                </div>
            </div>

            <div id="cart-empty" class="text-center py-5" style="display: none;">
                <p class="lead">Корзина пуста. Перейдите в каталог, чтобы добавить товары.</p>
                <a href="index.html" class="btn btn-warning fw-bold">Перейти в каталог</a>
            </div>

            <div class="row g-4" id="cart-container">
            </div>
        </section>

        <section id="order-section" class="order-form-container p-4 rounded border bg-white shadow-sm" style="display: none;">
            <h2 class="h4 mb-4 fw-bold">Оформление заказа</h2>
            <form id="order-form">
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="full_name" class="form-label fw-bold">Имя</label>
                            <input type="text" class="form-control" id="full_name" placeholder="Иван Иванов" required>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label fw-bold">Номер телефона</label>
                            <input type="tel" class="form-control" id="phone" placeholder="+70000000000" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="example@vm.ru" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="subscribe">
                            <label class="form-check-label" for="subscribe">Подписаться на рассылку</label>
                        </div>
                        <div class="mb-3">
                            <label for="comment" class="form-label fw-bold">Комментарий</label>
                            <textarea class="form-control" id="comment" rows="3"></textarea>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="delivery_address" class="form-label fw-bold">Адрес доставки</label>
                            <input type="text" class="form-control" id="delivery_address" placeholder="г. Киров ул. Ленина д. 1 кв. 1" required>
                        </div>
                        <div class="mb-3">
                            <label for="delivery_date" class="form-label fw-bold">Дата доставки</label>
                            <input type="date" class="form-control" id="delivery_date" required>
                        </div>
                        <div class="mb-3">
                            <label for="delivery_interval" class="form-label fw-bold">Интервал доставки</label>
                            <select class="form-select" id="delivery_interval" required>
                                <option value="08:00-12:00">08:00-12:00</option>
                                <option value="12:00-14:00">12:00-14:00</option>
                                <option value="14:00-18:00">14:00-18:00</option>
                                <option value="18:00-22:00">18:00-22:00</option>
                            </select>
                        </div>

                        <div class="mt-4 p-3 border rounded bg-light">
                            <h5 class="fw-bold mb-1">Итоговая стоимость: <span id="total-price">0</span> ₽</h5>
                            <p class="text-muted small mb-0">Доставка: <span id="delivery-cost">200</span> ₽</p>
                        </div>

                        <div class="d-flex gap-2 mt-4 justify-content-end">
                            <button type="reset" class="btn btn-secondary px-4">Сбросить</button>
                            <button type="submit" class="btn btn-warning fw-bold px-5">Оформить</button>
                        </div>
                    </div>
                </div>
            </form>
        </section>
    </main>

    <footer class="footer bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-2">+7 (999) 123-45-67 &nbsp;&nbsp; vashmir@vm.ru &nbsp;&nbsp; г. Киров, ул. Ленина, 12</p>
            <p class="small text-white-50 mb-0">&copy; 2025 ВашМир</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="cart.js"></script>
</body>

</html>
