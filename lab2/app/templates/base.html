<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>{% if title %}{{ title }}{% else %}Лабораторная работа №2{% endif %}</title>
  <style>
    /* Твои предпочтения по дизайну: Черный, Белый, Желтый */
    .navbar-dark .navbar-nav .nav-link {
      color: #ffffff;
    }

    .navbar-dark .navbar-nav .nav-link:hover {
      color: #ffc107;
    }

    /* Желтый акцент */
    .dropdown-item:hover {
      background-color: #ffc107;
      color: #000;
    }
  </style>
</head>

<body class="d-flex flex-column min-vh-100 bg-light text-dark">

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">ЛР № 2</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Задание</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('posts') }}">Посты</a></li>

            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown"
                aria-expanded="false">
                Запросы (ЛР2)
              </a>
              <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="navbarDropdown">
                <li><a class="dropdown-item" href="{{ url_for('form_input') }}">Заполнить форму (POST)</a></li>
                <li>
                  <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item" href="{{ url_for('url_params') }}">Параметры URL</a></li>
                <li><a class="dropdown-item" href="{{ url_for('headers') }}">Заголовки</a></li>
                <li><a class="dropdown-item" href="{{ url_for('cookies') }}">Cookie</a></li>
                <li><a class="dropdown-item" href="{{ url_for('form_params') }}">Данные формы</a></li>
                <li><a class="dropdown-item" href="{{ url_for('phone') }}">Валидация телефона</a></li>
              </ul>
            </li>

            <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">Об авторе</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="my-5">
    <div class="container bg-white p-5 border rounded shadow-sm">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <div class="container">
      <p class="mb-0">Вожавов Михаил Александрович, гр. 241-371</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
