{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Проверка номера телефона</h2>

<form method="POST">
    <div class="mb-3">
        <label for="phone_number" class="form-label">Введите номер телефона</label>
        <input type="text" 
               name="phone_number" 
               id="phone_number" 
               class="form-control {% if error %}is-invalid{% endif %}" 
               value="{{ phone_input }}"
               placeholder="+7 (123) 456-78-90">
        
        {% if error %}
        <div class="invalid-feedback">
            {{ error }}
        </div>
        {% endif %}
    </div>
    <button type="submit" class="btn btn-dark">Проверить</button>
</form>

{% if formatted %}
<div class="alert alert-success mt-4">
    <strong>Успех!</strong> Форматированный номер: <code>{{ formatted }}</code>
</div>
{% endif %}
{% endblock %}
