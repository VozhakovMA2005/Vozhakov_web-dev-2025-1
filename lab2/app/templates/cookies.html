{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Управление Cookie</h2>

<table class="table table-striped table-bordered mt-3">
    <thead class="table-dark">
        <tr>
            <th>Key</th>
            <th>Value</th>
        </tr>
    </thead>
    <tbody>
        {% for key, value in cookies.items() %}
        <tr>
            <td>{{ key }}</td>
            <td>{{ value }}</td>
        </tr>
        {% else %}
        <tr>
            <td colspan="2" class="text-center">Куки не установлены</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
