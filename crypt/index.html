<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шифратор</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* КАСТОМНЫЕ СТИЛИ ДЛЯ СООТВЕТСТВИЯ МАКЕТУ */
        :root {
            --primary-yellow: #FFD700;
            --border-black: 2px solid #000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }

        .main-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border: var(--border-black);
            padding: 0;
        }

        .header-title {
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            padding: 15px;
            border-bottom: var(--border-black);
            margin: 0;
        }

        .section-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #333;
        }

        /* Стилизация переключателей (Radio buttons) */
        .btn-group-custom {
            display: flex;
            width: 100%;
            border: var(--border-black);
        }

        .btn-check:checked + .btn-custom {
            background-color: var(--primary-yellow);
            color: black;
            font-weight: 700;
        }

        .btn-custom {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            background: white;
            border: none;
            text-transform: uppercase;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-custom:not(:last-child) {
            border-right: var(--border-black);
        }

        /* Поля ввода */
        .form-control-custom {
            border: var(--border-black);
            border-radius: 0;
            padding: 10px;
        }
        
        .form-control-custom:focus {
            box-shadow: none;
            border-color: #000;
            background-color: #fffae6;
        }

        .form-select-custom {
            border: var(--border-black);
            border-radius: 0;
            padding: 10px;
            font-weight: 500;
        }

        /* Главная кнопка */
        .btn-action {
            width: 100%;
            background-color: var(--primary-yellow);
            border: var(--border-black);
            padding: 15px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 0;
            margin-top: 20px;
        }

        .btn-action:hover {
            background-color: #e6c200;
            border: var(--border-black);
        }

        .helper-text {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }

        .padding-box {
            padding: 20px;
        }

        /* Стили для матрицы */
        .matrix-grid {
            display: grid;
            gap: 5px;
            justify-content: start;
            margin-bottom: 15px;
        }

        .matrix-input {
            width: 50px;
            height: 50px;
            text-align: center;
            border: var(--border-black);
            font-weight: bold;
        }

        .matrix-input:focus {
            outline: none;
            box-shadow: none;
            border-color: #000;
            background-color: #fffae6;
        }
        /* Убираем стрелочки у input type="number" */
        .matrix-input::-webkit-outer-spin-button,
        .matrix-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="main-container">
    <h3 class="header-title">Шифрование</h3>

    <div class="padding-box">
        <div class="mb-4">
            <div class="section-label">Режим работы</div>
            <div class="btn-group-custom">
                <input type="radio" class="btn-check" name="workMode" id="modeTest" value="test" checked>
                <label class="btn-custom" for="modeTest">Тестовый</label>

                <input type="radio" class="btn-check" name="workMode" id="modeText" value="text">
                <label class="btn-custom" for="modeText">Текстовый</label>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-5">
                <div class="section-label">Алгоритм</div>
                <select class="form-select form-select-custom" id="algorithmSelect">
                    <option value="caesar">ЦЕЗАРЬ</option>
                    <option value="atbash">АТБАШ</option>
                    <option value="polybius">ПОЛИБИЯ</option>
                    <option value="tritemiy">ТРИТЕМИЯ</option>
                    <option value="belazo">БЕЛАЗО</option>
                    <option value="vizhener">ВИЖИНЕРА</option>
                    <option value="magmat">МАГМА</option>
                    <option value="matrix">МАТРИЧНЫЙ</option>
                    <option value="playfer">ПЛЭЙФЕР</option>
                </select>
            </div>

            <div id="vizhenerOptions" class="mt-3" style="display: none;">
                <div class="section-label">Тип Вижинера</div>
                <div class="btn-group-custom">
                    <input type="radio" class="btn-check" name="vizhType" id="vizhSM" value="sm" checked>
                    <label class="btn-custom" for="vizhSM">Самоключ</label>
                
                    <input type="radio" class="btn-check" name="vizhType" id="vizhST" value="st">
                    <label class="btn-custom" for="vizhST">Ключ-ШТ</label>
                </div>
            </div>

            <div id="matrixOptions" class="mt-3" style="display: none;">
                <div class="section-label">Размер матрицы</div>
                <select class="form-select form-select-custom mb-3" id="matrixSizeSelect">
                    <option value="3" selected>3x3</option>
                    <option value="4">4x4</option>
                    <option value="5">5x5</option>
                </select>

                <div class="section-label">Элементы матрицы</div>
                <div id="matrixGridContainer">
                    </div>
            </div>

            <div class="col-md-7">
                <div class="section-label">Операция</div>
                <div class="btn-group-custom">
                    <input type="radio" class="btn-check" name="operation" id="opEncrypt" value="encrypt" checked>
                    <label class="btn-custom" for="opEncrypt">Шифрование</label>

                    <input type="radio" class="btn-check" name="operation" id="opDecrypt" value="decrypt">
                    <label class="btn-custom" for="opDecrypt">Расшифрование</label>
                </div>
            </div>
        </div>

        <div class="mb-4" id="keyContainer">
            <div class="section-label">Ключ</div>
            <input type="text" 
                   class="form-control form-control-custom" 
                   id="keyInput" 
                   placeholder="Введите число или слово"
                   autocomplete="off">
            <div class="helper-text">Введите число или текст.</div>
        </div>

        <div class="mb-3">
            <div class="section-label">Ввод данных</div>
            <textarea class="form-control form-control-custom" id="inputText" rows="4" placeholder="Введите текст..."></textarea>
        </div>

        <button class="btn btn-action" id="executeBtn">Выполнить операцию</button>

        <div class="mt-4">
            <div class="section-label">Результат</div>
            <textarea class="form-control form-control-custom" id="outputText" rows="4" readonly></textarea>
        </div>
    </div>
</div>

<script src="1_unambiguous_replacement.js"></script>
</body>
</html>
