{% extends 'base.html' %}
{% block content %}
<h2 class="border-bottom pb-2 mb-4 text-dark">Данные последней отправленной формы</h2>

{% if form_data %}
<table class="table table-striped border">
    <thead class="table-dark">
        <tr>
            <th>Поле</th>
            <th>Значение</th>
        </tr>
    </thead>
    <tbody>
        {% for key, value in form_data.items() %}
        <tr>
            <td class="fw-bold">{{ key }}</td>
            <td>{{ value }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<div class="alert alert-warning">
    Данные не найдены. Сначала <a href="{{ url_for('form_input') }}">заполните форму (POST)</a>.
</div>
{% endif %}
{% endblock %}
