<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заказы</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="orders.css">
    <link rel="stylesheet" href="construct.css">
</head>

<body>
    <header id="navigator">
        <div class="header_center">
            <h1>Food Construct</h1>
            <nav>
                <a href="index.html">О нас</a>
                <a href="construct.html">Собрать ланч</a>
                <a href="order.html">Оформить заказ</a>
                <a href="orders.html" class="active">Заказы</a>
                <a href="#contacts">Контакты</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="orders-section">
            <h2>История заказов</h2>

            <div id="orders-loading" class="loading">
                <p>Загрузка заказов...</p>
            </div>

            <div id="orders-empty" class="empty-state" style="display: none;">
                <p>У вас пока нет заказов.</p>
                <a href="construct.html" class="btn-primary">Собрать первый заказ</a>
            </div>

            <div id="orders-error" class="error-state" style="display: none;">
                <p>Ошибка загрузки заказов</p>
                <button id="retry-load-btn" class="btn-secondary">Повторить</button>
            </div>

            <div id="orders-list" style="display: none;">
                <!-- Заказы -->
            </div>
        </section>
    </main>

    <!-- Модальное окно просмотра деталей заказа -->
    <div id="order-details-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Просмотр заказа</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <div id="order-details-content">
                    <!-- Контент -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary close-modal-btn">ОК</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно редактирования заказа -->
    <div id="edit-order-modal" class="modal">
        <div class="modal-content" id="edit-modal-content">
            <!-- Контент -->
        </div>
    </div>

    <!-- Модальное окно подтверждения удаления -->
    <div id="delete-order-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Удаление заказа</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <p>Вы уверены, что хотите удалить заказ?</p>
                <input type="hidden" id="delete-order-id">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary close-modal-btn">Отмена</button>
                <button type="button" id="confirm-delete-btn" class="btn-danger">Да</button>
            </div>
        </div>
    </div>

    <footer id="contacts">
        <div class="footer_center">
            <p>Позвоните нам <a href="tel:+74950000000">+7 (495) 000-00-00</a></p>
        </div>
    </footer>

    <script src="orders.js"></script>
</body>

</html>
